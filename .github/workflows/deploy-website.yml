name: Deploy website

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    name: Build Pages artifact
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate static site
        run: python scripts/validate_static_site.py .

      - name: Prepare Pages artifact
        run: |
          rm -rf _site
          mkdir _site
          rsync -a ./ _site/ \
            --exclude .git/ \
            --exclude .github/ \
            --exclude scripts/ \
            --exclude gallery_beta/ \
            --exclude test_delete_me.txt \
            --exclude _site/
          # DNS is not configured yet, so publish under the default github.io URL for now.
          # When sweetbeansgrooming.com DNS is ready, remove this line so CNAME deploys.
          rm -f _site/CNAME
          touch _site/.nojekyll

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
